name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: ['1.21.x']
        node-version: ['18.x']

    services:
      localstack:
        image: localstack/localstack:latest
        env:
          SERVICES: sns,sqs
          AWS_DEFAULT_REGION: us-east-1
          EDGE_PORT: 4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
        ports:
          - 4566:4566

    steps:
      - uses: actions/checkout@v3

      # Set up Go
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: notifications/package-lock.json

      # Install jq (required for setup script)
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # Install Go dependencies
      - name: Install Go dependencies
        working-directory: orders
        run: |
          go mod download
          go mod verify

      # Install Node.js dependencies
      - name: Install Node.js dependencies
        working-directory: notifications
        run: npm ci

      # Set up AWS environment for tests
      - name: Set up AWS environment
        run: |
          # Set AWS credentials
          echo "AWS_ACCESS_KEY_ID=test" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=test" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV
          echo "AWS_ENDPOINT_URL=http://localhost:4566" >> $GITHUB_ENV

          # Set default resource URLs/ARNs
          echo "SNS_TOPIC_ARN=arn:aws:sns:us-east-1:000000000000:orders-topic" >> $GITHUB_ENV
          echo "SQS_QUEUE_URL=http://localhost:4566/000000000000/notifications-queue" >> $GITHUB_ENV
          echo "SQS_DLQ_URL=http://localhost:4566/000000000000/notifications-dlq" >> $GITHUB_ENV

      # Wait for LocalStack and set up infrastructure
      - name: Set up infrastructure
        run: |
          # Wait for LocalStack to be ready
          timeout 30 bash -c 'until curl -s http://localhost:4566/health; do sleep 1; done'
          sleep 5

          # Run setup script
          chmod +x scripts/setup-local-aws.sh
          ./scripts/setup-local-aws.sh

          # Export environment variables from .env.local
          if [ -f .env.local ]; then
            while IFS= read -r line; do
              if [[ ! "$line" =~ ^# ]] && [[ -n "$line" ]]; then
                echo "$line" >> $GITHUB_ENV
              fi
            done < .env.local
          fi

      # Run Go unit tests
      - name: Run Go unit tests
        working-directory: orders
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
          SNS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:orders-topic
          SQS_QUEUE_URL: http://localhost:4566/000000000000/notifications-queue
          SQS_DLQ_URL: http://localhost:4566/000000000000/notifications-dlq
        run: |
          # Run unit tests
          go test ./... -v -short
          
          # Run E2E tests
          go test ./tests/e2e/... -v

      # Run Node.js unit tests
      - name: Run Node.js unit tests
        working-directory: notifications
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
          SQS_QUEUE_URL: http://localhost:4566/000000000000/notifications-queue
          SQS_DLQ_URL: http://localhost:4566/000000000000/notifications-dlq
          SNS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:orders-topic
        run: npm test

      # Run E2E tests
      - name: Run E2E tests
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
          SNS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:orders-topic
          SQS_QUEUE_URL: http://localhost:4566/000000000000/notifications-queue
          SQS_DLQ_URL: http://localhost:4566/000000000000/notifications-dlq
        run: |
          chmod +x scripts/run-e2e-tests.sh
          ./scripts/run-e2e-tests.sh

  lint:
    name: Run Linters
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Set up Go
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21.x'

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      # Install golangci-lint
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.55.2

      # Install ESLint
      - name: Install ESLint
        working-directory: notifications
        run: npm install eslint --save-dev

      # Run Go linter
      - name: Run golangci-lint
        working-directory: orders
        run: golangci-lint run ./...

      # Run Node.js linter
      - name: Run ESLint
        working-directory: notifications
        run: npx eslint .